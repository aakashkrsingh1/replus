name: Keep Executor Awake

on:
  schedule:
    - cron: "*/5 * * * *"   # every 5 minutes
  workflow_dispatch:        # allows manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Wake up executor
        run: |
          curl -s -o /dev/null -w "%{http_code}" https://replus-executor.onrender.com/